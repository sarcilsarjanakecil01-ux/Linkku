<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kalkulator Rahasia</title>
    
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f0f0; font-family: sans-serif; }
        
        #login-screen { text-align: center; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        #passInput { padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; width: 200px;}
        button { padding: 10px 20px; background-color: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; }
        
        #error-message { display: none; margin-top: 15px; }
        #error-message img { max-width: 150px; border-radius: 10px; }

        #calculator { width: 300px; background: #333; padding: 20px; border-radius: 20px; display: none; }
        #display { width: 100%; height: 50px; font-size: 24px; text-align: right; margin-bottom: 10px; padding: 10px; border: none; border-radius: 5px; background: #eee; }
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .num-btn { height: 50px; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; background: #e0e0e0; }
        .operator { background: #f39c12; color: white; }
        .equals { background: #27ae60; color: white; grid-column: span 2; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h3>Akses Terbatas</h3>
        <input type="password" id="passInput" placeholder="Masukkan PIN">
        <br>
        <button onclick="checkPassword()">Buka</button>

        <div id="error-message">
            <img src="assets/WA_1783695698318.jpeg">
            <p style="color:red; font-weight:bold;">SALAH WOY!</p>
        </div>
    </div>

    <div id="calculator">
        <input type="text" id="display" disabled>
        <div class="buttons">
            <button onclick="clearDisplay()" class="num-btn">C</button>
            <button onclick="appendToDisplay('/')" class="num-btn operator">/</button>
            <button onclick="appendToDisplay('×')" class="num-btn operator">×</button>
            <button onclick="deleteLast()" class="num-btn">DEL</button>
            <button onclick="appendToDisplay('7')" class="num-btn">7</button>
            <button onclick="appendToDisplay('8')" class="num-btn">8</button>
            <button onclick="appendToDisplay('9')" class="num-btn">9</button>
            <button onclick="appendToDisplay('-')" class="num-btn operator">-</button>
            <button onclick="appendToDisplay('4')" class="num-btn">4</button>
            <button onclick="appendToDisplay('5')" class="num-btn">5</button>
            <button onclick="appendToDisplay('6')" class="num-btn">6</button>
            <button onclick="appendToDisplay('+')" class="num-btn operator">+</button>
            <button onclick="appendToDisplay('1')" class="num-btn">1</button>
            <button onclick="appendToDisplay('2')" class="num-btn">2</button>
            <button onclick="appendToDisplay('3')" class="num-btn">3</button>
            <button onclick="calculate()" class="num-btn equals">=</button>
            <button onclick="appendToDisplay('0')" class="num-btn" style="grid-column: span 2;">0</button>
            <button onclick="appendToDisplay('.')" class="num-btn">.</button>
        </div>
    </div>

    <script>
        const PASSWORD_BENAR = "cok";

        function checkPassword() {
            const input = document.getElementById("passInput").value;
            if (input === PASSWORD_BENAR) {
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("calculator").style.display = "block";
            } else {
                document.getElementById("error-message").style.display = "block";
                document.getElementById("passInput").value = "";
            }
        }

        const display = document.getElementById("display");
        function appendToDisplay(val) { display.value += val; }
        function clearDisplay() { display.value = ""; }
        function deleteLast() { display.value = display.value.slice(0, -1); }
        function calculate() {
            try {
                let expression = display.value.replace(/×/g, '*');
                display.value = eval(expression);
            } catch { display.value = "Error"; }
        }
    </script>
</body>
</html>
