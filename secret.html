<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koleksi Karya</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; padding: 20px; text-align: center; }
        .section { display: none; max-width: 400px; margin: auto; }
        .active { display: block; }
        
        /* Input & Tombol */
        input { padding: 12px; width: 80%; border-radius: 4px; border: none; margin-bottom: 10px; }
        .btn { display: block; background: #e50914; color: white; padding: 12px; margin: 15px auto; width: 80%; text-decoration: none; border-radius: 4px; border: none; cursor: pointer; }

        /* Galeri Minimalis */
        .film-item { margin-bottom: 20px; }
        .film-item img { width: 100%; display: block; border-radius: 8px; transition: 0.3s; }
        .film-item img:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <!-- 1. Halaman Login -->
    <div id="login" class="section active">
        <h2 style="margin-top: 50px;">Akses Konten</h2>
        <input type="password" id="pass" placeholder="Password">
        <button class="btn" onclick="check()">Masuk</button>
        <div id="error-msg" style="display:none;">
            <!-- Ganti 'gagal.jpg' dengan jalur gambar Anda -->
            <img src="assets/WA_1783695698318.jpeg" alt="anda salah" style="width:100px; margin-top:10px;">
        </div>
    </div>

    <!-- 2. Halaman Produk (Galeri) -->
    <div id="produk" class="section">
        <h2 style="text-align: left;">Koleksi</h2>
        
        <div class="film-item">
            <a href="https://link-tujuan-1.com">
                <img src="poster1.jpg" alt="Karya 1">
            </a>
        </div>

        <div class="film-item">
            <a href="https://link-tujuan-2.com">
                <img src="poster2.jpg" alt="Karya 2">
            </a>
        </div>

        <button class="btn" style="background:#333" onclick="show('login')">Keluar</button>
    </div>

    <script>
        function show(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function check() {
            var pass = document.getElementById("pass").value;
            if (pass === "cok") { show('produk'); } 
            else { document.getElementById("error-msg").style.display = "block"; }
        }
    </script>
</body>
</html>
